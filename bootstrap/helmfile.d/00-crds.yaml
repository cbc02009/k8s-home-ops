# yaml-language-server: $schema=https://json.schemastore.org/helmfile
helmDefaults:
  args:
    - --include-crds
    - --no-hooks

releases:

  - name: external-secrets
    namespace: security
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.1.0

  - name: externaldns-cloudflare
    namespace: network
    chart: oci://ghcr.io/home-operations/charts-mirror/external-dns
    version: 1.20.0

  - name: envoy-gateway
    namespace: network
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: 1.7.0

  - name: grafana-operator
    namespace: observability
    chart: oci://ghcr.io/grafana/helm-charts/grafana-operator
    version: 5.22.2

  - name: keda
    namespace: system
    chart: oci://ghcr.io/home-operations/charts-mirror/keda
    version: 2.19.0

  - name: kube-prometheus-stack
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
    version: 82.13.6

  - name: cloudnative-pg
    namespace: databases
    chart: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
    version: 0.27.1

  - name: barman-cloud
    namespace: database
    chart: oci://ghcr.io/cloudnative-pg/charts/plugin-barman-cloud
    version: 0.5.0
