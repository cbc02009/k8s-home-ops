---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  args:
    - --force-conflicts
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.5
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/ciliumbgpadvertisements.cilium.io
          - crd/ciliumbgpclusterconfigs.cilium.io
          - crd/ciliumbgppeerconfigs.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/networking.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.46.1
    values:
      - templates/values.yaml.gotmpl
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.3
    values:
      - templates/values.yaml.gotmpl
    needs:
      - kube-system/cilium

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.21.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - system/spegel

  - name: external-secrets
    namespace: security
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.7.0
    values:
      - templates/values.yaml.gotmpl
    needs:
      - cert-manager/cert-manager

  - name: onepassword
    namespace: security
    chart: oci://ghcr.io/bjw-s-labs/helm/app-template
    version: 5.0.1
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      - # Wait for ExternalSecrets CRDs to be available
        command: bash
        args:
          - -c
          - until kubectl get crd clustersecretstores.external-secrets.io &>/dev/null; do sleep 5; done
        events:
          - postsync
        showlogs: true
      - # Apply ExternalSecret Resources
        command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=kustomize-controller
          - --filename=../../kubernetes/apps/security/onepassword/app/clustersecretstore.yaml
        events:
          - postsync
        showlogs: true
    needs:
      - security/external-secrets

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.55.0
    values:
      - templates/values.yaml.gotmpl
    needs:
      - security/onepassword

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.55.0
    wait: false
    values:
      - templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator
