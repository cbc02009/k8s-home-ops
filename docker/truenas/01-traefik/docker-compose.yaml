---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json
configs:
  traefik-config:
    file: ./config/traefik.yaml

networks:
  app_ipvlan:
    driver: ipvlan
    name: app_ipvlan
    driver_opts:
      parent: br1
    ipam:
      driver: default
      config:
        - subnet: 192.168.5.0/24
          ip_range: 192.168.5.128/25
          gateway: 192.168.5.1
services:
  traefik:
    image: traefik:v3.7.5@sha256:e4d98158c01ad752fc1071d4e9573788747230d902cdde00a772516e692d07c9
    container_name: traefik
    restart: always
    environment:
      TZ: America/New_York
      CF_DNS_API_TOKEN: ${TRAEFIK_CF_DNS_API_TOKEN}
    networks:
      app_ipvlan:
        ipv4_address: 192.168.5.250
    configs:
      - source: traefik-config
        target: /etc/traefik/traefik.yaml
    volumes:
      - acme:/certs
      - ./config/dynamic:/dynamic
      - /var/run/docker.sock:/var/run/docker.sock


volumes:
  acme:
