http:
  routers:
    dashboard:
      rule: Host(`traefik.nas.cnas.dev`) # && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      service: api@internal
      entryPoints:
        - https
      tls:
        certResolver: cloudflare
        domains:
          - main: nas.cnas.dev
            sans:
              - "*.nas.cnas.dev"
    metrics:
      rule: Host(`traefik.nas.cnas.dev`) && PathPrefix(`/metrics`)
      service: prometheus@internal
      entryPoints:
        - https
      tls: true
