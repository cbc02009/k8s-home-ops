---
# yaml-language-server: $schema=https://k8s-schemas.kokoro.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-webhook-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: github-webhook-token
    template:
      data:
        token: "{{ .github_webhook_token }}"
  dataFrom:
    - extract:
        key: flux
      rewrite:
        - regexp:
            source: "[^a-zA-Z0-9 -]"
            target: "_"
