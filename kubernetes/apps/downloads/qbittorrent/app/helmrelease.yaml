---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:

    controllers:
      qbittorrent:
        annotations:
          secret.reloader.stakater.com/reload: qbittorrent-secret,qbittorrent-gluetun-secret

        pod:
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 1010 # shana:zfswrite
          terminationGracePeriodSeconds: 120

        # initContainers:
        #   coredns:
        #     image:
        #       repository: mirror.gcr.io/coredns/coredns
        #       tag: 1.14.1
        #     args:
        #       - -conf
        #       - /etc/coredns/Corefile
        #     restartPolicy: Always

        containers:
          app:
            nameOverride: *app
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.1.4
            env:
              TZ: "${TZ}"
              UMASK: "002"
              QBITTORRENT__PORT: &port 8080
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 150m
                memory: 2048Mi
              limits:
                memory: 8192Mi
            securityContext:
              runAsUser: 2000
              runAsGroup: 2000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

          # port-forward:
          #   image:
          #     repository: ghcr.io/bjw-s-labs/gluetun-qb-port-sync
          #     tag: 0.0.4@sha256:14ce24f2e054abf06f695f35c8c33612e49d6d0fe80a33896403d85b09a9d329
          #   env:
          #     GLUETUN_CONTROL_SERVER_HOST: localhost
          #     GLUETUN_CONTROL_SERVER_PORT: 8000
          #     GLUETUN_CONTROL_SERVER_API_KEY:
          #       valueFrom:
          #         secretKeyRef:
          #           name: qbittorrent-secret
          #           key: GLUETUN_CONTROL_SERVER_API_KEY
          #     QBITTORRENT_HOST: localhost
          #     QBITTORRENT_WEBUI_PORT: *port
          #     CRON_ENABLED: true
          #     CRON_SCHEDULE: "*/5 * * * *"
          #     LOG_TIMESTAMP: false
          #   securityContext:
          #     runAsUser: 2000
          #     runAsGroup: 2000
          #     runAsNonRoot: true
          #     allowPrivilegeEscalation: false
          #     readOnlyRootFilesystem: true
          #     capabilities:
          #       drop:
          #         - ALL
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "multus-vpn",
            "namespace": "network",
            "ips": ["192.168.99.100/24"],
            "mac": "3e:d0:83:c0:8e:50"
          }]
    service:
      app:
        controller: *app
        type: LoadBalancer
        loadBalancerIP: ${LB_QBT_GUI}
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.kokoro.wtf"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https


    persistence:
      config:
        enabled: true
        existingClaim: *app
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
      empty-config:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            port-forward:
              - path: /config
      media:
        type: nfs
        server: "${NAS_HOST}"
        advancedMounts:
          qbittorrent:
            app:
              - path: /media
        path: /mnt/tank/media
      # gluetun-auth:
      #   type: secret
      #   name: qbittorrent-gluetun-secret
      #   advancedMounts:
      #     qbittorrent:
      #       gluetun:
      #         - path: *gluetunAuthPath
      #           subPath: auth.toml
      # coredns:
      #   type: configMap
      #   name: qbittorrent-coredns
      #   advancedMounts:
      #     qbittorrent:
      #       coredns:
      #         - path: /etc/coredns/Corefile
      #           subPath: Corefile
      #           readOnly: true
      torrents:
        enabled: true
        type: nfs
        server: "${NAS_HOST}"
        path: /mnt/smoltank/torrents
        advancedMounts:
          qbittorrent:
            app:
              - path: /torrents
