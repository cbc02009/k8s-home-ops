---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
  namespace: selfhosted
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          01-init-db:
            envFrom: &envFrom
              - secretRef:
                  name: *app
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: '18.3.0'

        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.12.0@sha256:8d962f611390a1cca667eed32a29e9467e9c01c523e2db3ad00f667372067f9d
            env:
              TZ: "America/New_York"
              BASE_URL: https://mealie.${EXTERNAL_DOMAIN}
              DB_ENGINE: postgres
              SMTP_HOST: smtp-relay.selfhosted.svc.cluster.local
              SMTP_PORT: 25
              SMTP_FROM_NAME: Mealie
              SMTP_FROM_EMAIL: noreply@kokoro.wtf
              SMTP_AUTH_STRATEGY: NONE
            envFrom: *envFrom
            # resources:
            #   requests:
            #     memory: 250Mi
            #     cpu: 50m
            #   limits:
            #     memory: 500Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 9000

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.ctec.run"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https


    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data
