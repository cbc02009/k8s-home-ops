---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app opencloud
  namespace: selfhosted
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: external-secrets
      namespace: security
    - name: volysync
      namespace: system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 30m
  path: ./kubernetes/apps/selfhosted/opencloud/app
  postBuild:
    substitute:
      APP: *app
      HOSTNAME: opencloud.${PUBLIC_DOMAIN}
      AUTH_HOSTNAME: auth.${PUBLIC_DOMAIN}
      APP_UID: "1000"
      APP_GID: "1000"
      PVC_CLAIM: opencloud-data
      PVC_CAPACITY: &size 20Gi
      VOLSYNC_CACHE_CAPACITY: *size
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false
