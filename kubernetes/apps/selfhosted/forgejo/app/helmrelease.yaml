---
# yaml-language-server: $schema=https://k8s-schemas.kokoro.wtf/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  values:

    gitea:
      additionalConfigSources:
        - secret:
            secretName: forgejo-secret
      admin:
        existingSecret: forgejo-admin
      # See https://forgejo.org/docs/latest/admin/config-cheat-sheet/
      config:
        admin:
          DISABLE_REGULAR_ORG_CREATION: true
        cache:
          ADAPTER: redis
          HOST: &redis redis://dragonfly.databases.svc.cluster.local:6379/8
        cron.archive_cleanup:
          ENABLED: true
          RUN_AT_START: true
          SCHEDULE: "@every 1h"
          OLDER_THAN: 2h
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        lfs:
          PATH: /data/git/lfs
        mailer:
          ENABLED: true
          SMTP_ADDR: smtp-relay.selfhosted.svc.cluster.local
          SMTP_PORT: 25
          PROTOCOL: smtp
          FROM: "forgejo@kokoro.wtf"
          USER: ""
          PASSWD: ""
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          ACCOUNT_LINKING: auto
          USERNAME: preferred_username
          UPDATE_AVATAR: true
          OPENID_CONNECT_SCOPES: openid email profile groups
        queue:
          TYPE: redis
          CONN_STR: *redis
        repository:
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          ROOT: /data/git/repositories
        repository.pull-request:
          DEFAULT_DELETE_BRANCH_AFTER_MERGE: true
          DEFAULT_MERGE_STYLE: squash
        security:
          PASSWORD_COMPLEXITY: spec
        repository.signing:
          FORMAT: ssh
          SIGNING_KEY: /data/signing/ed25519.pub
          SIGNING_NAME: git.ctec.run Instance
          SIGNING_EMAIL: noreply@git.ctec.run
          INITIAL_COMMIT: pubkey
          CRUD_ACTIONS: pubkey, parentsigned
          WIKI: never
          MERGES: pubkey
        server:
          APP_DATA_PATH: /data/gitea
          DOMAIN: ${HOSTNAME}
          SSH_PORT: &sshPort 22
          SSH_LISTEN_PORT: 2222
          SSH_DOMAIN: ssh.${HOSTNAME}
          ROOT_URL: https://${HOSTNAME}
          SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          DEFAULT_KEEP_EMAIL_PRIVATE: true
          DISABLE_REGISTRATION: true
          ENABLE_PASSKEY_AUTHENTICATION: false
          SHOW_REGISTRATION_BUTTON: false
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: *redis
        time:
          DEFAULT_UI_LOCATION: ${TZ}
        webhook:
          ALLOWED_HOST_LIST: "*"
      oauth:
        - name: Authentik
          provider: openidConnect
          existingSecret: forgejo-authentik
          autoDiscoverUrl: https://${AUTH_HOST}/application/o/forgejo/.well-known/openid-configuration
          groupClaimName: users
          adminGroup: infrastructure
          iconUrl: https://${AUTH_HOST}/static/dist/assets/icons/icon.png
    extraContainerVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraInitVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraVolumes:
      - name: signing-key
        secret:
          secretName: forgejo-signing-key
          defaultMode: 0400
    image:
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 14.0.3-rootless
    httpRoute:
      enabled: true
      hostnames:
        - ${HOSTNAME}
      parentRefs:
        - name: envoy-internal
          namespace: network
    persistence:
      create: false
      claimName: *app
    podAnnotations:
      reloader.stakater.com/auto: "true"
    podSecurityContext:
      fsGroup: 2000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - SYS_CHROOT
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 2000
    service:
      http:
        port: 3000
      ssh:
        type: LoadBalancer
        port: 22
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "ssh.${HOSTNAME}"
          lbipam.cilium.io/ips: ${LB_FORGEJO}
