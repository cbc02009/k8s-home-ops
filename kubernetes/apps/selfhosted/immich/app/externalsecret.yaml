---
# yaml-language-server: $schema=https://k8s-schemas.kokoro.wtf/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name immich-secret
  namespace: selfhosted
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Immich
        DB_DATABASE_NAME: &dbname immich
        DB_HOSTNAME: &dbhost postgres-immich-rw.databases.svc.cluster.local
        DB_USERNAME: &dbuser "{{ .pg_user }}"
        DB_PASSWORD: &dbpass "{{ .pg_pass }}"
        JWT_SECRET: "{{ .jwt_secret }}"
        # Dragonfly
        REDIS_HOSTNAME: dragonfly.databases.svc.cluster.local
        REDIS_PORT: "6379"
        REDIS_DBINDEX: "3"
        # Postgres Init
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: *dbhost
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .postgres_super_pass}}"
        immich-config.yaml: |
          backup:
            database:
              enabled: false
          ffmpeg:
            crf: 23
            threads: 2
            preset: veryfast
            targetVideoCodec: hevc
            acceptedVideoCodecs: [h264, hevc]
            targetAudioCodec: aac
            acceptedAudioCodecs: [aac, mp3]
            targetResolution: "720"
            maxBitrate: "0"
            bframes: "-1"
            refs: 0
            gopSize: 0
            temporalAQ: false
            cqMode: auto
            twoPass: false
            preferredHwDevice: auto
            transcode: required
            accelDecode: true
            tonemap: hable
            accel: qsv
          job:
            backgroundTask:
              concurrency: 5
            smartSearch:
              concurrency: 2
            metadataExtraction:
              concurrency: 5
            faceDetection:
              concurrency: 2
            search:
              concurrency: 5
            sidecar:
              concurrency: 5
            library:
              concurrency: 5
            migration:
              concurrency: 5
            thumbnailGeneration:
              concurrency: 5
            videoConversion:
              concurrency: 1
            notifications:
              concurrency: 5
          logging:
            enabled: true
            level: debug
          machineLearning:
            enabled: true
            urls: [http://immich-machine-learning.selfhosted:3003]
            clip:
              enabled: true
              modelName: ViT-B-16-SigLIP__webli
            facialRecognition:
              enabled: true
              modelName: buffalo_l
              minScore: "0.7"
              maxDistance: "0.5"
              minFaces: 5
          map:
            enabled: true
          reverseGeocoding:
            enabled: true
          oauth:
            autoLaunch: true
            autoRegister: true
            buttonText: Login with Authentik
            clientId: "{{ .oidc_id }}"
            clientSecret: "{{ .oidc_secret }}"
            defaultStorageQuota: 0
            enabled: true
            issuerUrl: https://auth.kokoro.wtf/application/o/immich/.well-known/openid-configuration
            mobileOverrideEnabled: false
            mobileRedirectUri: ""
            scope: openid email profile
            signingAlgorithm: RS256
            storageLabelClaim: preferred_username
            storageQuotaClaim: immich_quota
          passwordLogin:
            enabled: false
          storageTemplate:
            enabled: true
            hashVerificationEnabled: true
            template: "{{`{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}`}}"
          image:
            thumbnail:
              format: webp
              size: 480
              quality: 80
            preview:
              format: jpeg
              size: 1440
              quality: 80
            colorspace: p3
            extractEmbedded: false
          newVersionCheck:
            enabled: false
          trash:
            enabled: true
            days: 7
          theme:
            customCss: ""
          library:
            scan:
              enabled: true
              cronExpression: "0 0 * * *"
            watch:
              enabled: false
          server:
            externalDomain: https://photos.kokoro.wtf
            loginPageMessage: ""
          notifications:
            smtp:
              enabled: true
              from: "Immich <noreply@kokoro.wtf>"
              replyTo: ""
              transport:
                host: smtp-relay.kokoro.wtf
                port: 25
          user:
            deleteDelay: 2

  dataFrom:
    - extract:
        key: immich
    - extract:
        key: postgres
      rewrite:
        - regexp:
            source: "(.*)"
            target: "postgres_$1"
