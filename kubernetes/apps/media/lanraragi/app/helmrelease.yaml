---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lanraragi
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:

    controllers:
      lanraragi:
        containers:
          app:
            image:
              repository: docker.io/difegue/lanraragi
              tag: v.0.9.60

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 3000

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.kokoro.wtf"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https


    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          lanraragi:
            database:
              - path: /home/koyomi/lanraragi/database
                subPath: /database
            thumbs:
              - path: /home/koyomi/lanraragi/thumb
                subPath: /thumb

      media:
        type: nfs
        server: shana.ctec.internal
        path: /mnt/tank/media
        advancedMounts:
          lanraragi:
            manga:
              - path: /home/koyomi/lanraragi/content
                subPath: lanraragi/content
