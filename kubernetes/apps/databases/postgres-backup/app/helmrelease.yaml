---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-backup
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: postgres-backup
  values:
    controllers:
      main:
        type: cronjob
        cronjob:
          schedule: "@daily"
          ttlSecondsAfterFinished: 43200
        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
          enableServiceLinks: false
        containers:
          main:
            image:
              repository: docker.io/prodrigestivill/postgres-backup-local
              tag: 18@sha256:f70742ebe42b2277689b028d1fd15aa80f77cffa01da163cc9f85a6ff1866e7f
            command: ["/backup.sh"]
            envFrom:
              - secretRef:
                  name: postgres-backup
            env:
              - name: POSTGRES_HOST
                value: postgres.kokoro.wtf
              - name: POSTGRES_DB
                value: "postgres"
              - name: POSTGRES_CLUSTER
                value: "true"
              - name: BACKUP_KEEP_DAYS
                value: "7"
              - name: BACKUP_KEEP_WEEKS
                value: "4"
              - name: BACKUP_KEEP_MONTHS
                value: "6"
              - name: BACKUP_KEEP_MINS
                value: "7200"
              - name: POSTGRES_EXTRA_OPTS
                value: "-b -C -c -Z6"

    persistence:
      backups:
        enabled: true
        type: nfs
        server: ${NAS_HOST}
        path: /mnt/tank/k8s/apps/postgres-backup
        globalMounts:
          - path: /backups
