---
# yaml-language-server: $schema=https://k8s-schemas.kokoro.wtf/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: &app ${APP}-dragonfly-db
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0@sha256:0fa01a2b929e704c7a9300d23e7f52002ebd39e90996fb8bb63826aed92fa06f
  replicas: ${DRAGONFLY_REPLICAS:=1}
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          key: AWS_ACCESS_KEY_ID
          name: ${APP}-dragonfly-secret
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          key: AWS_SECRET_ACCESS_KEY
          name: ${APP}-dragonfly-secret
    # - name: AWS_REGION
    #   value: "garage"
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --cluster_mode=emulated
    - --dbnum=1
    - --dbfilename=
    - --default_lua_flags=allow-undeclared-keys
    - --proactor_threads=2
    - --version_check=false
  resources:
    requests:
      cpu: 100m
    limits:
      memory: 512Mi
  # snapshot:
  #   dir: "s3://dragonfly"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      nodeTaintsPolicy: Honor
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
          app: *app
